<!DOCTYPE html>
<html lang="fr" data-lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Projets — Nour Imane Kerroumi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --cream:#f5efe4;--cream2:#ede3d2;--cream3:#e0d0b8;
  --gold:#b8922a;--gold2:#d4aa44;
  --golddim:rgba(184,146,42,0.10);--goldborder:rgba(184,146,42,0.20);
  --ink:#1a120a;--ink2:#3a2810;--ink3:rgba(26,18,10,0.55);--ink4:rgba(26,18,10,0.22);
  --S:'Cormorant',Georgia,serif;--J:'Jost',sans-serif;
  --nav-h:60px;--pad:clamp(24px,5vw,80px);
}
[data-lang="fr"] .en{display:none}
[data-lang="en"] .fr{display:none}
body{background:var(--cream);color:var(--ink);font-family:var(--J);font-weight:300;overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--cream2)}
::-webkit-scrollbar-thumb{background:var(--goldborder);border-radius:2px}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);background:rgba(245,239,228,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--goldborder);display:flex;align-items:center}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 var(--pad);width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--S);font-size:1.05rem;font-weight:600;color:var(--ink);text-decoration:none}
.nav-logo em{font-style:italic;color:var(--gold);font-weight:300}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink);text-decoration:none;transition:color .2s;font-weight:500}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.lang-toggle{display:flex;border:1px solid var(--goldborder);border-radius:100px;overflow:hidden}
.lb{font-family:var(--J);font-size:0.56rem;letter-spacing:0.1em;padding:5px 12px;background:transparent;border:none;cursor:pointer;color:var(--ink3);transition:all .2s}
.lb.on{background:var(--gold);color:white;font-weight:600}
#canvas3d{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.15}
main{position:relative;z-index:1;padding-top:var(--nav-h)}
.page-header{max-width:1400px;margin:0 auto;padding:80px var(--pad) 72px;border-bottom:1px solid var(--goldborder)}
.issue-label{font-size:0.54rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:14px}
.issue-label::before{content:'';width:36px;height:1px;background:var(--gold)}
.big-title{font-family:var(--S);font-size:clamp(4rem,8vw,8rem);font-weight:700;line-height:0.88;letter-spacing:-0.03em;color:var(--ink)}
.big-title em{font-style:italic;color:var(--gold);font-weight:300;display:block}
.projects-grid{max-width:1400px;margin:0 auto;padding:80px var(--pad);display:grid;grid-template-columns:1fr 1fr;gap:2px}
.proj-card{display:block;text-decoration:none;background:var(--cream2);border:1px solid var(--cream3);padding:52px 48px;position:relative;overflow:hidden;transition:background .3s,transform .3s,box-shadow .3s;cursor:pointer}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--gold),var(--gold2));transform:scaleX(0);transform-origin:left;transition:transform .4s ease}
.proj-card:hover{background:white;transform:translateY(-4px);box-shadow:0 20px 60px rgba(184,146,42,0.12)}
.proj-card:hover::before{transform:scaleX(1)}
.proj-bg-num{position:absolute;right:-16px;bottom:-20px;font-family:var(--S);font-size:clamp(120px,18vw,200px);font-weight:700;color:transparent;-webkit-text-stroke:1px rgba(184,146,42,0.07);line-height:1;pointer-events:none;user-select:none;transition:-webkit-text-stroke .3s}
.proj-card:hover .proj-bg-num{-webkit-text-stroke:1px rgba(184,146,42,0.15)}
.proj-num{font-size:0.52rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.proj-title{font-family:var(--S);font-size:clamp(1.8rem,3vw,2.8rem);font-weight:700;line-height:1.1;color:var(--ink);margin-bottom:10px;position:relative;z-index:1}
.proj-subtitle{font-family:var(--S);font-style:italic;font-weight:300;font-size:1.05rem;color:var(--ink3);margin-bottom:24px;position:relative;z-index:1}
.proj-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px;position:relative;z-index:1}
.pill{font-size:0.56rem;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;background:var(--cream);border:1px solid var(--cream3);color:var(--ink3);transition:all .2s}
.proj-card:hover .pill{border-color:var(--goldborder);color:var(--gold)}
.proj-cta{display:inline-flex;align-items:center;gap:8px;font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);border-bottom:1px solid rgba(184,146,42,0.3);padding-bottom:3px;transition:gap .25s;position:relative;z-index:1}
.proj-card:hover .proj-cta{gap:14px}
.rv{opacity:0;transform:translateY(24px);transition:opacity .9s ease,transform .9s ease}
.rv.in{opacity:1;transform:none}
footer{border-top:1px solid var(--goldborder);padding:24px var(--pad);display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.f-name{font-family:var(--S);font-style:italic;font-size:0.9rem;color:var(--ink3)}
.f-link{font-size:0.52rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink4);text-decoration:none;transition:color .2s}
.f-link:hover{color:var(--gold)}
@media(max-width:820px){
  .nav-links{display:none}
  .projects-grid{grid-template-columns:1fr}
  .proj-card{padding:36px 24px}
}
</style>
</head>
<body>

<div id="fade" style="position:fixed;inset:0;background:#f5efe4;z-index:9999;pointer-events:none;opacity:1;transition:opacity 0.6s ease;"></div>
<canvas id="canvas3d"></canvas>

<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">✦ Portfolio</a>
    <div style="display:flex;align-items:center;gap:24px">
      <ul class="nav-links">
        <li><a href="../formation/index.html"><span class="fr">Formation</span><span class="en">Education</span></a></li>
        <li><a href="../experience/index.html"><span class="fr">Expérience</span><span class="en">Experience</span></a></li>
        <li><a href="../skills/index.html"><span class="fr">Compétences</span><span class="en">Skills</span></a></li>
        <li><a href="../projects/index.html" class="active"><span class="fr">Projets</span><span class="en">Projects</span></a></li>
        <li><a href="../contact.html">Contact</a></li>
      </ul>
      <div class="lang-toggle">
        <button class="lb on" onclick="setL('fr')">FR</button>
        <button class="lb" onclick="setL('en')">EN</button>
      </div>
    </div>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="issue-label">
      <span class="fr">Projets</span>
      <span class="en">Projects</span>
    </div>
    <h1 class="big-title">
      <span class="fr">Ce que j'ai<em>construit</em></span>
      <span class="en">What I've<em>built</em></span>
    </h1>
  </div>
  <div class="projects-grid" id="projects-grid"></div>
</main>

<footer>
  <span class="f-name">Nour Imane Kerroumi</span>
  <a href="https://github.com/Nourimanekerroumi996/nourimanekerroumi996.github.io" target="_blank" class="f-link">View source ↗</a>
</footer>

<script src="projects.js"></script>
<script>
const obs = new IntersectionObserver(es => {
  es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); obs.unobserve(e.target); }});
}, { threshold: 0.06 });

function renderProjects() {
  const grid = document.getElementById('projects-grid');
  const lang = document.documentElement.getAttribute('data-lang') || 'fr';
  grid.innerHTML = PROJECTS.map((p, i) => `
    <a href="${p.file}" class="proj-card rv" style="transition-delay:${i * 0.12}s">
      <div class="proj-bg-num">${p.id}</div>
      <div class="proj-num">Projet ${p.id} · ${p.type}</div>
      <h2 class="proj-title">${p.title}</h2>
      <p class="proj-subtitle">${p.subtitle[lang]}</p>
      <div class="proj-pills">${p.pills.map(pill => `<span class="pill">${pill}</span>`).join('')}</div>
      <div class="proj-cta">${lang === 'fr' ? 'Voir le projet' : 'View project'} →</div>
    </a>
  `).join('');
  grid.querySelectorAll('.rv').forEach(el => obs.observe(el));
}

function setL(l) {
  document.documentElement.setAttribute('data-lang', l);
  document.querySelectorAll('.lb').forEach(b => b.classList.toggle('on', b.textContent.trim().toLowerCase() === l));
  renderProjects();
}

window.addEventListener('load', () => {
  setTimeout(() => { document.getElementById('fade').style.opacity = '0'; }, 50);
  renderProjects();
});

document.querySelectorAll('a[href]').forEach(link => {
  link.addEventListener('click', e => {
    const href = link.getAttribute('href');
    if(!href || href.startsWith('#') || href.startsWith('mailto') || href.startsWith('http')) return;
    e.preventDefault();
    const fade = document.getElementById('fade');
    fade.style.opacity = '1'; fade.style.pointerEvents = 'all';
    setTimeout(() => { window.location.href = href; }, 500);
  });
});

window.addEventListener('load', () => {
  const canvas = document.getElementById('canvas3d');
  if(!canvas || !window.THREE) return;
  const W = window.innerWidth, H = window.innerHeight;
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(W, H); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 100);
  camera.position.z = 5;
  const N = 180; const pos = new Float32Array(N*3);
  for(let i = 0; i < N; i++) { pos[i*3]=(Math.random()-0.5)*18; pos[i*3+1]=(Math.random()-0.5)*14; pos[i*3+2]=(Math.random()-0.5)*8; }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xb8922a, size: 0.035, transparent: true, opacity: 0.6 })));
  scene.add(new THREE.AmbientLight(0xffeedd, 0.3));
  let mx = 0, my = 0;
  window.addEventListener('mousemove', e => { mx=(e.clientX/W-0.5)*2; my=(e.clientY/H-0.5)*2; });
  window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); });
  let t = 0;
  (function animate() {
    requestAnimationFrame(animate); t += 0.004;
    scene.children[0].rotation.y = t*0.03 + mx*0.05;
    scene.children[0].rotation.x = t*0.015 + my*0.03;
    renderer.render(scene, camera);
  })();
});
</script>
</body>
</html>
